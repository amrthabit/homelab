# /etc/dnsmasq.d/homelab.conf
# DHCP + DNS for VLAN 20 (IoT) and VLAN 30 (trusted)

# Bind only to VLAN sub-interfaces — never on eth0 (Gigahub handles VLAN 10)
interface=eth0.20
interface=eth0.30
bind-interfaces

# Don't poll resolv.conf, define upstream explicitly
no-resolv
server=1.1.1.1
server=1.0.0.1

# Cache size
cache-size=1000

# Don't forward names without dots (e.g. plain "raspberrypi") to upstream
domain-needed
bogus-priv

# DHCP range — VLAN 20 (IoT)
dhcp-range=interface:eth0.20,192.168.20.50,192.168.20.200,12h

# DHCP range — VLAN 30 (trusted)
dhcp-range=interface:eth0.30,192.168.30.50,192.168.30.200,12h

# Static reservations
dhcp-host=02:b2:a6:37:0a:fe,192.168.30.86,homeassistant  # HA on ThinkPad

# Log DHCP leases for debugging
log-dhcp

# Authoritative on these networks
dhcp-authoritative
